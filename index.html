<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实用工具导航 - 开发者的工具箱</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 头部区域 -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">
                    <i class="fas fa-toolbox"></i>
                    实用工具导航
                </h1>
                <p class="subtitle">收录各种实用工具，提升开发效率与日常体验</p>
                
                <!-- 搜索框 -->
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" placeholder="搜索工具名称或描述...">
                    <button id="clearSearch" class="clear-btn" title="清除搜索">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <!-- 主题切换 -->
                <div class="theme-toggle">
                    <button id="themeToggle" class="theme-btn" title="切换主题">
                        <i class="fas fa-moon"></i>
                        <span>深色模式</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- 分类导航 -->
        <nav class="category-nav">
            <div class="category-container">
                <button class="category-btn active" data-category="all">
                    <i class="fas fa-th-large"></i>
                    全部工具
                </button>
                <button class="category-btn" data-category="dev">
                    <i class="fas fa-code"></i>
                    编程开发
                </button>
                <button class="category-btn" data-category="utility">
                    <i class="fas fa-wrench"></i>
                    实用工具
                </button>
                <button class="category-btn" data-category="game">
                    <i class="fas fa-gamepad"></i>
                    游戏娱乐
                </button>
                <button class="category-btn" data-category="system">
                    <i class="fas fa-cogs"></i>
                    系统工具
                </button>
                <button class="category-btn" data-category="rescue">
                    <i class="fas fa-first-aid"></i>
                    系统急救
                </button>
                <button class="category-btn" data-category="office">
                    <i class="fas fa-file-alt"></i>
                    办公软件
                </button>
                <a href="tools.html" class="category-btn">
                    <i class="fas fa-tools"></i>
                    小工具
                </a>
                <a href="chat-real.html" class="category-btn chat-btn">
                    <i class="fas fa-comments"></i>
                    聊天室
                </a>
            </div>
        </nav>

        <!-- 工具卡片区域 -->
        <main class="main-content">
            <div class="tools-grid" id="toolsGrid">
                <!-- 卡片将通过JavaScript动态生成 -->
            </div>
            
            <!-- 无结果提示 -->
            <div class="no-results" id="noResults" style="display: none;">
                <i class="fas fa-search"></i>
                <h3>未找到匹配的工具</h3>
                <p>尝试使用其他关键词或选择其他分类</p>
            </div>
        </main>

        <!-- 天气信息 -->
        <div class="weather-section">
            <div class="weather-container">
                <h3><i class="fas fa-cloud-sun"></i> 当前地区天气</h3>
                <div class="weather-info" id="weatherInfo">
                    <div class="weather-loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        正在获取天气信息...
                    </div>
                </div>
                <div class="weather-refresh">
                    <button id="refreshWeather" class="weather-btn">
                        <i class="fas fa-sync-alt"></i>
                        刷新天气
                    </button>
                    <span class="weather-time" id="weatherTime"></span>
                </div>
            </div>
        </div>

        <!-- 底部信息 -->
        <footer class="footer">
            <div class="footer-content">
                <p><a href="https://www.wuxiaoguo.com" target="_blank" class="footer-link">www.wuxiaoguo.com</a> | 实用工具导航 | 持续更新中</p>
                <p class="footer-info">
                    <i class="fas fa-info-circle"></i>
                    点击工具卡片可访问官方网站
                </p>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
