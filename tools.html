<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小工具 - 实用工具导航</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 小工具特定样式 */
        .tools-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 2rem;
        }
        
        .tool-box {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 12px var(--shadow-color);
            border: 1px solid var(--border-color);
            transition: all var(--transition-speed);
        }
        
        .tool-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px var(--hover-shadow);
        }
        
        .tool-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }
        
        .tool-header i {
            font-size: 2rem;
            color: var(--primary-color);
        }
        
        .tool-header h3 {
            font-size: 1.5rem;
            color: var(--text-color);
            margin: 0;
        }
        
        /* 计算器样式 */
        .calculator {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .calculator-display {
            width: 100%;
            padding: 15px;
            font-size: 2rem;
            text-align: right;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', monospace;
            overflow-x: auto;
        }
        
        .calculator-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        .calc-btn {
            padding: 15px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            background-color: var(--bg-color);
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .calc-btn:hover {
            background-color: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }
        
        .calc-btn.operator {
            background-color: rgba(67, 97, 238, 0.1);
            color: var(--primary-color);
        }
        
        .calc-btn.equals {
            background-color: var(--primary-color);
            color: white;
        }
        
        .calc-btn.clear {
            background-color: var(--warning-color);
            color: white;
        }
        
        /* CPS测试样式 */
        .cps-test {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .cps-area {
            width: 200px;
            height: 200px;
            background-color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: all 0.1s;
            box-shadow: 0 6px 15px rgba(67, 97, 238, 0.3);
        }
        
        .cps-area:hover {
            transform: scale(1.05);
        }
        
        .cps-area:active {
            transform: scale(0.95);
            background-color: var(--secondary-color);
        }
        
        .cps-area.active {
            background-color: var(--success-color);
        }
        
        .cps-stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        
        .cps-stat {
            text-align: center;
            padding: 15px;
            background-color: var(--bg-color);
            border-radius: 10px;
            min-width: 120px;
        }
        
        .cps-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .cps-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        
        .cps-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .cps-btn {
            padding: 10px 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .cps-btn:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
        }
        
        .cps-btn.reset {
            background-color: var(--warning-color);
        }
        
        /* 计时器样式 */
        .timer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .timer-display {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--primary-color);
            font-family: 'Courier New', monospace;
        }
        
        .timer-controls {
            display: flex;
            gap: 10px;
        }
        
        .timer-btn {
            padding: 10px 25px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .timer-btn:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
        }
        
        .timer-btn.stop {
            background-color: var(--warning-color);
        }
        
        .timer-btn.reset {
            background-color: var(--text-secondary);
        }
        
        /* 单位转换器样式 */
        .converter {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .converter-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .converter-input {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
        }
        
        .converter-select {
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
            min-width: 100px;
        }
        
        .converter-swap {
            padding: 10px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .converter-swap:hover {
            background-color: var(--secondary-color);
            transform: rotate(180deg);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .tools-container {
                grid-template-columns: 1fr;
            }
            
            .cps-stats {
                flex-direction: column;
                align-items: center;
            }
            
            .cps-stat {
                width: 100%;
                max-width: 200px;
            }
            
            .calculator-buttons {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .calc-btn {
                padding: 12px;
                font-size: 1.1rem;
            }
        }
        
        @media (max-width: 480px) {
            .tool-box {
                padding: 20px;
            }
            
            .calculator-display {
                font-size: 1.5rem;
                padding: 12px;
            }
            
            .calc-btn {
                padding: 10px;
                font-size: 1rem;
            }
            
            .cps-area {
                width: 150px;
                height: 150px;
                font-size: 2rem;
            }
            
            .timer-display {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部区域 -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">
                    <i class="fas fa-tools"></i>
                    小工具集合
                </h1>
                <p class="subtitle">实用的在线小工具，无需安装即可使用</p>
                
                <!-- 主题切换 -->
                <div class="theme-toggle">
                    <button id="themeToggle" class="theme-btn" title="切换主题">
                        <i class="fas fa-moon"></i>
                        <span>深色模式</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- 导航 -->
        <nav class="category-nav">
            <div class="category-container">
                <a href="index.html" class="category-btn">
                    <i class="fas fa-toolbox"></i>
                    工具导航
                </a>
                <button class="category-btn active" data-category="all">
                    <i class="fas fa-th-large"></i>
                    全部工具
                </button>
                <button class="category-btn" data-category="dev">
                    <i class="fas fa-code"></i>
                    开发工具
                </button>
                <button class="category-btn" data-category="security">
                    <i class="fas fa-shield-alt"></i>
                    安全工具
                </button>
                <button class="category-btn" data-category="media">
                    <i class="fas fa-photo-video"></i>
                    媒体工具
                </button>
                <button class="category-btn" data-category="hardware">
                    <i class="fas fa-desktop"></i>
                    硬件测试
                </button>
                <a href="chat-real.html" class="category-btn chat-btn">
                    <i class="fas fa-comments"></i>
                    聊天室
                </a>
            </div>
        </nav>

        <!-- 小工具区域 -->
        <main class="main-content">
            <div class="tools-container">
                <!-- 计算器 -->
                <div class="tool-box">
                    <div class="tool-header">
                        <i class="fas fa-calculator"></i>
                        <h3>计算器</h3>
                    </div>
                    <div class="calculator">
                        <input type="text" class="calculator-display" id="calcDisplay" value="0" readonly>
                        <div class="calculator-buttons">
                            <button class="calc-btn clear" onclick="clearCalculator()">C</button>
                            <button class="calc-btn" onclick="deleteLast()">⌫</button>
                            <button class="calc-btn operator" onclick="appendOperator('/')">/</button>
                            <button class="calc-btn operator" onclick="appendOperator('*')">×</button>
                            
                            <button class="calc-btn" onclick="appendNumber('7')">7</button>
                            <button class="calc-btn" onclick="appendNumber('8')">8</button>
                            <button class="calc-btn" onclick="appendNumber('9')">9</button>
                            <button class="calc-btn operator" onclick="appendOperator('-')">-</button>
                            
                            <button class="calc-btn" onclick="appendNumber('4')">4</button>
                            <button class="calc-btn" onclick="appendNumber('5')">5</button>
                            <button class="calc-btn" onclick="appendNumber('6')">6</button>
                            <button class="calc-btn operator" onclick="appendOperator('+')">+</button>
                            
                            <button class="calc-btn" onclick="appendNumber('1')">1</button>
                            <button class="calc-btn" onclick="appendNumber('2')">2</button>
                            <button class="calc-btn" onclick="appendNumber('3')">3</button>
                            <button class="calc-btn equals" onclick="calculate()" rowspan="2">=</button>
                            
                            <button class="calc-btn" onclick="appendNumber('0')" colspan="2">0</button>
                            <button class="calc-btn" onclick="appendDecimal()">.</button>
                        </div>
                    </div>
                </div>

                <!-- CPS点击速度测试 -->
                <div class="tool-box">
                    <div class="tool-header">
                        <i class="fas fa-mouse-pointer"></i>
                        <h3>CPS点击速度测试</h3>
                    </div>
                    <div class="cps-test">
                        <div class="cps-area" id="cpsArea">
                            点击开始
                        </div>
                        
                        <div class="cps-stats">
                            <div class="cps-stat">
                                <div class="cps-value" id="cpsCount">0</div>
                                <div class="cps-label">点击次数</div>
                            </div>
                            <div class="cps-stat">
                                <div class="cps-value" id="cpsSpeed">0.0</div>
                                <div class="cps-label">CPS (点击/秒)</div>
                            </div>
                            <div class="cps-stat">
                                <div class="cps-value" id="cpsTime">10</div>
                                <div class="cps-label">剩余时间(秒)</div>
                            </div>
                        </div>
                        
                        <div class="cps-controls">
                            <button class="cps-btn" id="startCps">开始测试</button>
                            <button class="cps-btn reset" id="resetCps">重置</button>
                        </div>
                        
                        <div style="margin-top: 15px; color: var(--text-secondary); font-size: 0.9rem;">
                            <i class="fas fa-info-circle"></i> 点击上面的圆圈开始测试，测试时间为10秒
                        </div>
                    </div>
                </div>

                <!-- 计时器 -->
                <div class="tool-box">
                    <div class="tool-header">
                        <i class="fas fa-stopwatch"></i>
                        <h3>计时器</h3>
                    </div>
                    <div class="timer">
                        <div class="timer-display" id="timerDisplay">00:00:00</div>
                        <div class="timer-controls">
                            <button class="timer-btn" id="startTimer">开始</button>
                            <button class="timer-btn stop" id="stopTimer">暂停</button>
                            <button class="timer-btn reset" id="resetTimer">重置</button>
                        </div>
                        <div style="color: var(--text-secondary); font-size: 0.9rem;">
                            <i class="fas fa-info-circle"></i> 简单的计时器，支持开始、暂停和重置
                        </div>
                    </div>
                </div>

                <!-- 单位转换器 -->
                <div class="tool-box">
                    <div class="tool-header">
                        <i class="fas fa-exchange-alt"></i>
                        <h3>单位转换器</h3>
                    </div>
                    <div class="converter">
                        <div class="converter-row">
                            <input type="number" class="converter-input" id="converterInput" value="1" oninput="convertUnits()">
                            <select class="converter-select" id="fromUnit" onchange="convertUnits()">
                                <option value="cm">厘米 (cm)</option>
                                <option value="m" selected>米 (m)</option>
                                <option value="km">千米 (km)</option>
                                <option value="inch">英寸 (in)</option>
                                <option value="foot">英尺 (ft)</option>
                                <option value="mile">英里 (mi)</option>
                            </select>
                        </div>
                        
                        <div style="text-align: center;">
                            <button class="converter-swap" onclick="swapUnits()">
                                <i class="fas fa-exchange-alt"></i>
                            </button>
                        </div>
                        
                        <div class="converter-row">
                            <input type="number" class="converter-input" id="converterOutput" readonly>
                            <select class="converter-select" id="toUnit" onchange="convertUnits()">
                                <option value="cm">厘米 (cm)</option>
                                <option value="m">米 (m)</option>
                                <option value="km" selected>千米 (km)</option>
                                <option value="inch">英寸 (in)</option>
                                <option value="foot">英尺 (ft)</option>
                                <option value="mile">英里 (mi)</option>
                            </select>
                        </div>
                        
                        <div style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 10px;">
                            <i class="fas fa-info-circle"></i> 支持长度单位转换
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 底部信息 -->
        <footer class="footer">
            <div class="footer-content">
                <p><a href="https://www.wuxiaoguo.com" target="_blank" class="footer-link">www.wuxiaoguo.com</a> | 实用工具导航 | 小工具集合</p>
                <p class="footer-info">
                    <i class="fas fa-info-circle"></i>
                    点击小工具即可使用，无需安装
                </p>
            </div>
        </footer>
    </div>

    <script>
        // ==================== 主题切换功能 ====================
        let currentTheme = localStorage.getItem('theme') || 'light';
        
        function initTheme() {
            document.documentElement.setAttribute('data-theme', currentTheme);
            updateThemeButton();
        }
        
        function updateThemeButton() {
            const icon = document.querySelector('#themeToggle i');
            const text = document.querySelector('#themeToggle span');
            
            if (currentTheme === 'dark') {
                icon.className = 'fas fa-sun';
                text.textContent = '浅色模式';
            } else {
                icon.className = 'fas fa-moon';
                text.textContent = '深色模式';
            }
        }
        
        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('theme', currentTheme);
            updateThemeButton();
        }
        
        // ==================== 分类筛选功能 ====================
        let currentToolCategory = 'all';
        const categoryBtns = document.querySelectorAll('.category-btn[data-category]');
        const toolBoxes = document.querySelectorAll('.tool-box');
        
        function initCategoryFilter() {
            // 添加分类按钮点击事件
            categoryBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const category = btn.dataset.category;
                    filterToolsByCategory(category);
                    updateCategoryButtons(category);
                });
            });
            
            // 初始显示所有工具
            filterToolsByCategory('all');
            updateCategoryButtons('all');
        }
        
        function filterToolsByCategory(category) {
            currentToolCategory = category;
            
            toolBoxes.forEach(box => {
                const boxCategory = box.dataset.category || 'all';
                
                if (category === 'all' || boxCategory === category) {
                    box.style.display = 'block';
                    // 添加淡入动画
                    setTimeout(() => {
                        box.style.opacity = '1';
                        box.style.transform = 'translateY(0)';
                    }, 10);
                } else {
                    box.style.opacity = '0';
                    box.style.transform = 'translateY(20px)';
                    setTimeout(() => {
                        box.style.display = 'none';
                    }, 300);
                }
            });
        }
        
        function updateCategoryButtons(activeCategory) {
            categoryBtns.forEach(btn => {
                if (btn.dataset.category === activeCategory) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }
        
        // 为工具盒子添加分类属性
        function assignToolCategories() {
            const toolBoxes = document.querySelectorAll('.tool-box');
            
            // 计算器 - 开发工具
            toolBoxes[0].dataset.category = 'dev';
            // CPS测试 - 硬件测试
            toolBoxes[1].dataset.category = 'hardware';
            // 计时器 - 开发工具
            toolBoxes[2].dataset.category = 'dev';
            // 单位转换器 - 开发工具
            toolBoxes[3].dataset.category = 'dev';
            
            // 添加更多工具到不同分类
            addSecurityTools();
            addMediaTools();
        }
        
        // 添加安全工具
        function addSecurityTools() {
            const toolsContainer = document.querySelector('.tools-container');
            
            // 密码强度检查器
            const passwordChecker = document.createElement('div');
            passwordChecker.className = 'tool-box';
            passwordChecker.dataset.category = 'security';
            passwordChecker.innerHTML = `
                <div class="tool-header">
                    <i class="fas fa-shield-alt"></i>
                    <h3>密码强度检查器</h3>
                </div>
                <div class="password-generator">
                    <input type="password" class="password-display" id="passwordCheckInput" placeholder="输入密码检查强度..." style="width: 100%;">
                    <div class="code-controls">
                        <button class="code-btn" id="checkPassword">
                            <i class="fas fa-search"></i>
                            检查强度
                        </button>
                    </div>
                    <div class="password-strength" id="passwordCheckResult">
                        输入密码后点击检查
                    </div>
                </div>
            `;
            toolsContainer.appendChild(passwordChecker);
            
            // 添加密码检查功能
            document.getElementById('checkPassword').addEventListener('click', checkPasswordStrength);
            document.getElementById('passwordCheckInput').addEventListener('input', checkPasswordStrength);
        }
        
        // 添加媒体工具
        function addMediaTools() {
            const toolsContainer = document.querySelector('.tools-container');
            
            // 颜色选择器
            const colorPicker = document.createElement('div');
            colorPicker.className = 'tool-box';
            colorPicker.dataset.category = 'media';
            colorPicker.innerHTML = `
                <div class="tool-header">
                    <i class="fas fa-palette"></i>
                    <h3>颜色选择器</h3>
                </div>
                <div class="hardware-test">
                    <div style="text-align: center; margin-bottom: 15px;">
                        <input type="color" id="colorPicker" value="#4361ee" style="width: 100px; height: 100px;">
                    </div>
                    <div class="test-stats">
                        <div class="test-stat">
                            <div class="test-value" id="colorHex">#4361ee</div>
                            <div class="test-label">HEX</div>
                        </div>
                        <div class="test-stat">
                            <div class="test-value" id="colorRgb">rgb(67, 97, 238)</div>
                            <div class="test-label">RGB</div>
                        </div>
                    </div>
                    <div style="margin-top: 15px; color: var(--text-secondary); font-size: 0.9rem;">
                        <i class="fas fa-info-circle"></i> 点击颜色方块选择颜色
                    </div>
                </div>
            `;
            toolsContainer.appendChild(colorPicker);
            
            // 添加颜色选择器功能
            document.getElementById('colorPicker').addEventListener('input', updateColorInfo);
        }
        
        // 密码强度检查函数
        function checkPasswordStrength() {
            const password = document.getElementById('passwordCheckInput').value;
            const resultElement = document.getElementById('passwordCheckResult');
            
            if (!password) {
                resultElement.textContent = '请输入密码';
                resultElement.className = 'password-strength';
                return;
            }
            
            let score = 0;
            let feedback = [];
            
            // 长度检查
            if (password.length >= 8) score += 1;
            if (password.length >= 12) score += 1;
            if (password.length >= 16) score += 1;
            
            // 字符类型检查
            if (/[a-z]/.test(password)) score += 1;
            if (/[A-Z]/.test(password)) score += 1;
            if (/[0-9]/.test(password)) score += 1;
            if (/[^a-zA-Z0-9]/.test(password)) score += 2;
            
            // 常见密码检查
            const commonPasswords = ['password', '123456', 'qwerty', 'admin', 'welcome'];
            if (commonPasswords.includes(password.toLowerCase())) {
                score = 0;
                feedback.push('这是一个常见密码，非常不安全！');
            }
            
            // 设置结果
            let strength = '';
            let className = '';
            
            if (score <= 3) {
                strength = '弱';
                className = 'strength-weak';
                feedback.push('建议：增加密码长度，使用大小写字母、数字和特殊字符');
            } else if (score <= 6) {
                strength = '中等';
                className = 'strength-medium';
                feedback.push('建议：可以增加特殊字符和长度来提高安全性');
            } else {
                strength = '强';
                className = 'strength-strong';
                feedback.push('这是一个强密码，继续保持！');
            }
            
            resultElement.textContent = `密码强度: ${strength} (得分: ${score}/8)`;
            resultElement.className = `password-strength ${className}`;
            
            // 显示详细反馈
            if (feedback.length > 0) {
                resultElement.innerHTML += `<br><small>${feedback.join('<br>')}</small>`;
            }
        }
        
        // 颜色选择器功能
        function updateColorInfo() {
            const color = document.getElementById('colorPicker').value;
            const hexElement = document.getElementById('colorHex');
            const rgbElement = document.getElementById('colorRgb');
            
            hexElement.textContent = color;
            
            // 转换HEX到RGB
            const r = parseInt(color.slice(1, 3), 16);
            const g = parseInt(color.slice(3, 5), 16);
            const b = parseInt(color.slice(5, 7), 16);
            
            rgbElement.textContent = `rgb(${r}, ${g}, ${b})`;
        }
        
        // 初始化主题和分类
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            
            assignToolCategories();
            initCategoryFilter();
        });
        
        // ==================== 计算器功能 ====================
        let calculatorDisplay = document.getElementById('calcDisplay');
        let calculatorValue = '0';
        let waitingForOperand = false;
        let operator = null;
        let previousValue = 0;
        
        function updateCalculatorDisplay() {
            calculatorDisplay.value = calculatorValue;
        }
        
        function appendNumber(number) {
            if (waitingForOperand) {
                calculatorValue = number;
                waitingForOperand = false;
            } else {
                calculatorValue = calculatorValue === '0' ? number : calculatorValue + number;
            }
            updateCalculatorDisplay();
        }
        
        function appendDecimal() {
            if (waitingForOperand) {
                calculatorValue = '0.';
                waitingForOperand = false;
            } else if (calculatorValue.indexOf('.') === -1) {
                calculatorValue += '.';
            }
            updateCalculatorDisplay();
        }
        
        function appendOperator(nextOperator) {
            const inputValue = parseFloat(calculatorValue);
            
            if (operator && waitingForOperand) {
                operator = nextOperator;
                return;
            }
            
            if (previousValue === 0) {
                previousValue = inputValue;
            } else if (operator) {
                const currentValue = previousValue || 0;
                const newValue = performCalculation(operator, currentValue, inputValue);
                
                calculatorValue = String(newValue);
                previousValue = newValue;
            }
            
            waitingForOperand = true;
            operator = nextOperator;
            updateCalculatorDisplay();
        }
        
        function performCalculation(operator, firstValue, secondValue) {
            switch (operator) {
                case '+': return firstValue + secondValue;
                case '-': return firstValue - secondValue;
                case '*': return firstValue * secondValue;
                case '/': return firstValue / secondValue;
                default: return secondValue;
            }
        }
        
        function calculate() {
            const inputValue = parseFloat(calculatorValue);
            
            if (operator && !waitingForOperand) {
                const currentValue = previousValue || 0;
                const newValue = performCalculation(operator, currentValue, inputValue);
                
                calculatorValue = String(newValue);
                previousValue = newValue;
                operator = null;
                waitingForOperand = true;
                updateCalculatorDisplay();
            }
        }
        
        function clearCalculator() {
            calculatorValue = '0';
            previousValue = 0;
            operator = null;
            waitingForOperand = false;
            updateCalculatorDisplay();
        }
        
        function deleteLast() {
            if (calculatorValue.length > 1) {
                calculatorValue = calculatorValue.slice(0, -1);
            } else {
                calculatorValue = '0';
            }
            updateCalculatorDisplay();
        }
        
        // ==================== CPS测试功能 ====================
        let cpsCount = 0;
        let cpsStartTime = null;
        let cpsTimer = null;
        let cpsTimeLeft = 10;
        let cpsActive = false;
        
        const cpsArea = document.getElementById('cpsArea');
        const cpsCountElement = document.getElementById('cpsCount');
        const cpsSpeedElement = document.getElementById('cpsSpeed');
        const cpsTimeElement = document.getElementById('cpsTime');
        const startCpsBtn = document.getElementById('startCps');
        const resetCpsBtn = document.getElementById('resetCps');
        
        function startCPSTest() {
            if (cpsActive) return;
            
            cpsActive = true;
            cpsCount = 0;
            cpsTimeLeft = 10;
            cpsStartTime = Date.now();
            
            cpsArea.textContent = '点击！';
            cpsArea.classList.add('active');
            
            updateCPSDisplay();
            
            // 开始倒计时
            cpsTimer = setInterval(() => {
                cpsTimeLeft--;
                updateCPSDisplay();
                
                if (cpsTimeLeft <= 0) {
                    endCPSTest();
                }
            }, 1000);
        }
        
        function handleCPSClick() {
            if (!cpsActive) {
                startCPSTest();
                return;
            }
            
            cpsCount++;
            updateCPSDisplay();
        }
        
        function updateCPSDisplay() {
            cpsCountElement.textContent = cpsCount;
            cpsTimeElement.textContent = cpsTimeLeft;
            
            // 计算CPS
            const elapsedTime = (Date.now() - cpsStartTime) / 1000;
            const cps = elapsedTime > 0 ? (cpsCount / elapsedTime).toFixed(1) : '0.0';
            cpsSpeedElement.textContent = cps;
        }
        
        function endCPSTest() {
            clearInterval(cpsTimer);
            cpsActive = false;
            
            cpsArea.textContent = '测试结束';
            cpsArea.classList.remove('active');
            
            // 显示最终结果
            const totalTime = 10;
            const finalCPS = (cpsCount / totalTime).toFixed(1);
            alert(`测试结束！\n点击次数: ${cpsCount}\n平均CPS: ${finalCPS}`);
        }
        
        function resetCPSTest() {
            clearInterval(cpsTimer);
            cpsActive = false;
            cpsCount = 0;
            cpsTimeLeft = 10;
            
            cpsArea.textContent = '点击开始';
            cpsArea.classList.remove('active');
            
            updateCPSDisplay();
        }
        
        // CPS事件监听
        cpsArea.addEventListener('click', handleCPSClick);
        startCpsBtn.addEventListener('click', startCPSTest);
        resetCpsBtn.addEventListener('click', resetCPSTest);
        
        // ==================== 计时器功能 ====================
        let timerInterval = null;
        let timerSeconds = 0;
        let timerRunning = false;
        
        const timerDisplay = document.getElementById('timerDisplay');
        const startTimerBtn = document.getElementById('startTimer');
        const stopTimerBtn = document.getElementById('stopTimer');
        const resetTimerBtn = document.getElementById('resetTimer');
        
        function formatTime(seconds) {
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            
            return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        function updateTimerDisplay() {
            timerDisplay.textContent = formatTime(timerSeconds);
        }
        
        function startTimer() {
            if (timerRunning) return;
            
            timerRunning = true;
            timerInterval = setInterval(() => {
                timerSeconds++;
                updateTimerDisplay();
            }, 1000);
        }
        
        function stopTimer() {
            if (!timerRunning) return;
            
            timerRunning = false;
            clearInterval(timerInterval);
        }
        
        function resetTimer() {
            stopTimer();
            timerSeconds = 0;
            updateTimerDisplay();
        }
        
        // 计时器事件监听
        startTimerBtn.addEventListener('click', startTimer);
        stopTimerBtn.addEventListener('click', stopTimer);
        resetTimerBtn.addEventListener('click', resetTimer);
        
        // ==================== 单位转换器功能 ====================
        // 单位转换系数（相对于米）
        const unitFactors = {
            'cm': 100,
            'm': 1,
            'km': 0.001,
            'inch': 39.3701,
            'foot': 3.28084,
            'mile': 0.000621371
        };
        
        function convertUnits() {
            const inputValue = parseFloat(document.getElementById('converterInput').value) || 0;
            const fromUnit = document.getElementById('fromUnit').value;
            const toUnit = document.getElementById('toUnit').value;
            
            // 先转换为米，再转换为目标单位
            const valueInMeters = inputValue / unitFactors[fromUnit];
            const outputValue = valueInMeters * unitFactors[toUnit];
            
            document.getElementById('converterOutput').value = outputValue.toFixed(6);
        }
        
        function swapUnits() {
            const fromUnit = document.getElementById('fromUnit');
            const toUnit = document.getElementById('toUnit');
            const inputValue = document.getElementById('converterInput');
            const outputValue = document.getElementById('converterOutput');
            
            // 交换单位
            const tempUnit = fromUnit.value;
            fromUnit.value = toUnit.value;
            toUnit.value = tempUnit;
            
            // 交换数值
            const tempValue = inputValue.value;
            inputValue.value = outputValue.value;
            
            // 重新计算
            convertUnits();
        }
        
        // 初始化单位转换器
        document.addEventListener('DOMContentLoaded', () => {
            convertUnits();
        });
        
        // ==================== 键盘快捷键 ====================
        document.addEventListener('keydown', (e) => {
            // 计算器数字键
            if (e.key >= '0' && e.key <= '9') {
                appendNumber(e.key);
            }
            
            // 计算器操作符
            if (e.key === '+') appendOperator('+');
            if (e.key === '-') appendOperator('-');
            if (e.key === '*') appendOperator('*');
            if (e.key === '/') appendOperator('/');
            
            // 计算器其他键
            if (e.key === '.') appendDecimal();
            if (e.key === 'Enter' || e.key === '=') calculate();
            if (e.key === 'Escape') clearCalculator();
            if (e.key === 'Backspace') deleteLast();
            
            // 空格键开始CPS测试
            if (e.key === ' ' && !cpsActive) {
                e.preventDefault();
                startCPSTest();
            }
        });
    </script>
</body>
</html>
