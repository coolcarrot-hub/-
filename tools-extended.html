<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扩展小工具 - 实用工具导航</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 扩展小工具样式 */
        .tools-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 2rem;
        }
        
        .tool-box {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 12px var(--shadow-color);
            border: 1px solid var(--border-color);
            transition: all var(--transition-speed);
        }
        
        .tool-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px var(--hover-shadow);
        }
        
        .tool-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }
        
        .tool-header i {
            font-size: 2rem;
            color: var(--primary-color);
        }
        
        .tool-header h3 {
            font-size: 1.5rem;
            color: var(--text-color);
            margin: 0;
        }
        
        /* 代码编辑器样式 */
        .code-editor {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .code-tabs {
            display: flex;
            gap: 5px;
            border-bottom: 2px solid var(--border-color);
        }
        
        .code-tab {
            padding: 10px 20px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .code-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }
        
        .code-area {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
        }
        
        .code-output {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background-color: #1e1e1e;
            color: #f0f0f0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            overflow: auto;
        }
        
        .code-controls {
            display: flex;
            gap: 10px;
        }
        
        .code-btn {
            padding: 10px 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .code-btn:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
        }
        
        /* 密码生成器样式 */
        .password-generator {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .password-display {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', monospace;
            text-align: center;
        }
        
        .password-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .option-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .option-label {
            color: var(--text-color);
            font-weight: 500;
        }
        
        .option-input {
            width: 80px;
            padding: 8px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        
        .option-checkbox {
            width: 20px;
            height: 20px;
        }
        
        .password-strength {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
        }
        
        .strength-weak {
            background-color: rgba(247, 37, 133, 0.1);
            color: var(--warning-color);
        }
        
        .strength-medium {
            background-color: rgba(255, 193, 7, 0.1);
            color: #ffc107;
        }
        
        .strength-strong {
            background-color: rgba(76, 201, 240, 0.1);
            color: var(--success-color);
        }
        
        /* Base64工具样式 */
        .base64-tool {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .base64-area {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
        }
        
        .base64-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .base64-btn {
            padding: 10px 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .base64-btn:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
        }
        
        /* 硬件测试样式 */
        .hardware-test {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .test-area {
            width: 100%;
            height: 200px;
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }
        
        .test-active {
            background-color: var(--primary-color);
            color: white;
        }
        
        .test-stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        
        .test-stat {
            text-align: center;
            padding: 15px;
            background-color: var(--bg-color);
            border-radius: 10px;
            min-width: 120px;
        }
        
        .test-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .test-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        
        /* 键盘测试样式 */
        .keyboard-test {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .keyboard-display {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', monospace;
            font-size: 14px;
            min-height: 100px;
        }
        
        .key-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        
        .key-item {
            padding: 10px;
            background-color: var(--bg-color);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        
        .key-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }
        
        .key-value {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary-color);
            font-family: 'Courier New', monospace;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .tools-container {
                grid-template-columns: 1fr;
            }
            
            .test-stats {
                flex-direction: column;
                align-items: center;
            }
            
            .test-stat {
                width: 100%;
                max-width: 200px;
            }
            
            .key-info {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 480px) {
            .tool-box {
                padding: 20px;
            }
            
            .code-area, .code-output, .base64-area {
                height: 150px;
                font-size: 12px;
            }
            
            .password-display {
                font-size: 1rem;
                padding: 12px;
            }
            
            .test-area {
                height: 150px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部区域 -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">
                    <i class="fas fa-tools"></i>
                    扩展小工具集合
                </h1>
                <p class="subtitle">更多实用的在线小工具，无需安装即可使用</p>
                
                <!-- 主题切换 -->
                <div class="theme-toggle">
                    <button id="themeToggle" class="theme-btn" title="切换主题">
                        <i class="fas fa-moon"></i>
                        <span>深色模式</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- 导航 -->
        <nav class="category-nav">
            <div class="category-container">
                <a href="index.html" class="category-btn">
                    <i class="fas fa-toolbox"></i>
                    工具导航
                </a>
                <a href="tools.html" class="category-btn">
                    <i class="fas fa-tools"></i>
                    基础小工具
                </a>
                <button class="category-btn active">
                    <i class="fas fa-tools"></i>
                    扩展小工具
                </button>
                <a href="chat-real.html" class="category-btn chat-btn">
                    <i class="fas fa-comments"></i>
                    聊天室
                </a>
            </div>
        </nav>

        <!-- 小工具区域 -->
        <main class="main-content">
            <div class="tools-container">
                <!-- HTML在线运行工具 -->
                <div class="tool-box">
                    <div class="tool-header">
                        <i class="fas fa-code"></i>
                        <h3>HTML 在线运行工具</h3>
                    </div>
                    <div class="code-editor">
                        <div class="code-tabs">
                            <button class="code-tab active" data-tab="html">HTML</button>
                            <button class="code-tab" data-tab="css">CSS</button>
                            <button class="code-tab" data-tab="js">JavaScript</button>
                        </div>
                        
                        <textarea class="code-area" id="htmlCode" placeholder="输入HTML代码..."><!DOCTYPE html>
<html>
<head>
    <title>测试页面</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .demo { background: #f0f0f0; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="demo">
        <h1>Hello World!</h1>
        <p>这是一个HTML在线运行示例。</p>
        <button onclick="alert('你好！')">点击我</button>
    </div>
</body>
</html></textarea>
                        
                        <div class="code-controls">
                            <button class="code-btn" id="runCode">
                                <i class="fas fa-play"></i>
                                运行代码
                            </button>
                            <button class="code-btn" id="clearCode">
                                <i class="fas fa-trash"></i>
                                清空
                            </button>
                        </div>
                        
                        <div class="code-output" id="codeOutput">
                            <!-- 代码输出将在这里显示 -->
                        </div>
                    </div>
                </div>

                <!-- 随机密码生成器 -->
                <div class="tool-box">
                    <div class="tool-header">
                        <i class="fas fa-key"></i>
                        <h3>随机密码生成器</h3>
                    </div>
                    <div class="password-generator">
                        <input type="text" class="password-display" id="passwordDisplay" value="点击生成密码" readonly>
                        
                        <div class="password-options">
                            <div class="option-row">
                                <span class="option-label">密码长度:</span>
                                <input type="number" class="option-input" id="passwordLength" value="12" min="4" max="64">
                            </div>
                            
                            <div class="option-row">
                                <span class="option-label">包含大写字母 (A-Z):</span>
                                <input type="checkbox" class="option-checkbox" id="includeUppercase" checked>
                            </div>
                            
                            <div class="option-row">
                                <span class="option-label">包含小写字母 (a-z):</span>
                                <input type="checkbox" class="option-checkbox" id="includeLowercase" checked>
                            </div>
                            
                            <div class="option-row">
                                <span class="option-label">包含数字 (0-9):</span>
                                <input type="checkbox" class="option-checkbox" id="includeNumbers" checked>
                            </div>
                            
                            <div class="option-row">
                                <span class="option-label">包含特殊字符 (!@#$%):</span>
                                <input type="checkbox" class="option-checkbox" id="includeSpecial">
                            </div>
                        </div>
                        
                        <div class="code-controls">
                            <button class="code-btn" id="generatePassword">
                                <i class="fas fa-sync-alt"></i>
                                生成密码
                            </button>
                            <button class="code-btn" id="copyPassword">
                                <i class="fas fa-copy"></i>
                                复制密码
                            </button>
                        </div>
                        
                        <div class="password-strength" id="passwordStrength">
                            密码强度: 中等
                        </div>
                    </div>
                </div>

                <!-- Base64编码解码工具 -->
                <div class="tool-box">
                    <div class="tool-header">
                        <i class="fas fa-exchange-alt"></i>
                        <h3>Base64 编码解码工具</h3>
                    </div>
                    <div class="base64-tool">
                        <textarea class="base64-area" id="base64Input" placeholder="输入要编码或解码的文本...">Hello, Base64!</textarea>
                        
                        <div class="base64-controls">
                            <button class="base64-btn" id="encodeBase64">
                                <i class="fas fa-arrow-down"></i>
                                编码 Base64
                            </button>
                            <button class="base64-btn" id="decodeBase64">
                                <i class="fas fa-arrow-up"></i>
                                解码 Base64
                            </button>
                        </div>
                        
                        <textarea class="base64-area" id="base64Output" placeholder="编码/解码结果将显示在这里..." readonly></textarea>
                        
                        <div style="color: var(--text-secondary); font-size: 0.9rem;">
                            <i class="fas fa-info-circle"></i> 支持文本、URL和二进制数据的Base64转换
                        </div>
                    </div>
                </div>

                <!-- 麦克风测试 -->
                <div class="tool-box">
                    <div class="tool-header">
                        <i class="fas fa-microphone"></i>
                        <h3>麦克风测试</h3>
                    </div>
                    <div class="hardware-test
