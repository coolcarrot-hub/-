<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时聊天室 - 实用工具导航</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 聊天室特定样式 */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 200px);
            max-height: 700px;
            background-color: var(--card-bg);
            border-radius: 15px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 12px var(--shadow-color);
            overflow: hidden;
        }
        
        .chat-header {
            padding: 20px;
            background-color: var(--primary-color);
            color: white;
            text-align: center;
        }
        
        .chat-header h2 {
            margin: 0;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }
        
        .message.received {
            align-self: flex-start;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
        }
        
        .message.sent {
            align-self: flex-end;
            background-color: var(--primary-color);
            color: white;
        }
        
        .message.system {
            align-self: center;
            background-color: rgba(67, 97, 238, 0.1);
            border: 1px solid rgba(67, 97, 238, 0.2);
            max-width: 90%;
            text-align: center;
        }
        
        .message.private {
            border-left: 4px solid var(--accent-color);
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.85rem;
            opacity: 0.8;
        }
        
        .message-ip {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 3px;
        }
        
        .message-content {
            line-height: 1.4;
            word-break: break-word;
        }
        
        .chat-input-area {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background-color: var(--card-bg);
        }
        
        .input-container {
            display: flex;
            gap: 10px;
        }
        
        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 25px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
            transition: all var(--transition-speed);
        }
        
        #messageInput:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        #sendMessage {
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-speed);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        #sendMessage:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
        }
        
        .chat-info {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            border-radius: 25px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-speed);
            text-decoration: none;
            margin-top: 20px;
        }
        
        .back-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            transform: translateY(-2px);
        }
        
        .user-list {
            margin-top: 20px;
            padding: 15px;
            background-color: var(--card-bg);
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }
        
        .user-list h3 {
            margin-top: 0;
            margin-bottom: 10px;
            color: var(--text-color);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .users {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .user-tag {
            padding: 5px 12px;
            background-color: rgba(67, 97, 238, 0.1);
            color: var(--primary-color);
            border-radius: 15px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all var(--transition-speed);
        }
        
        .user-tag:hover {
            background-color: rgba(67, 97, 238, 0.2);
            transform: translateY(-2px);
        }
        
        .user-tag.you {
            background-color: rgba(76, 201, 240, 0.2);
            color: var(--success-color);
        }
        
        .username-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .username-modal.hidden {
            display: none;
        }
        
        .username-box {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }
        
        .username-box h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--text-color);
        }
        
        .username-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
            margin-bottom: 15px;
        }
        
        .username-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        .username-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-speed);
        }
        
        .username-submit:hover {
            background-color: var(--secondary-color);
        }
        
        .private-chat-window {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            height: 400px;
            background-color: var(--card-bg);
            border-radius: 15px;
            border: 1px solid var(--border-color);
            box-shadow: 0 5px 20px var(--shadow-color);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }
        
        .private-chat-header {
            padding: 15px;
            background-color: var(--accent-color);
            color: white;
            border-radius: 15px 15px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .private-chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }
        
        .private-chat-input {
            padding: 15px;
            border-top: 1px solid var(--border-color);
        }
        
        .close-private-chat {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
        }
        
        .online-count {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        @media (max-width: 768px) {
            .chat-container {
                height: calc(100vh - 250px);
            }
            
            .input-container {
                flex-direction: column;
            }
            
            #sendMessage {
                width: 100%;
                justify-content: center;
            }
            
            .private-chat-window {
                width: calc(100% - 40px);
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部区域 -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">
                    <i class="fas fa-comments"></i>
                    实时聊天室
                </h1>
                <p class="subtitle">与真实用户实时交流，分享工具使用心得</p>
                
                <!-- 主题切换 -->
                <div class="theme-toggle">
                    <button id="themeToggle" class="theme-btn" title="切换主题">
                        <i class="fas fa-moon"></i>
                        <span>深色模式</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- 导航 -->
        <nav class="category-nav">
            <div class="category-container">
                <a href="index.html" class="category-btn">
                    <i class="fas fa-toolbox"></i>
                    工具导航
                </a>
                <button class="category-btn active">
                    <i class="fas fa-comments"></i>
                    实时聊天
                </button>
            </div>
        </nav>

        <!-- 登录/注册模态框 -->
        <div id="loginModal" class="username-modal">
            <div class="username-box">
                <h3 id="loginTitle">用户登录</h3>
                
                <div class="login-tabs">
                    <button class="login-tab active" data-tab="login">登录</button>
                    <button class="login-tab" data-tab="register">注册</button>
                </div>
                
                <!-- 登录表单 -->
                <form id="loginForm" class="login-form active">
                    <input type="text" id="loginUsername" class="username-input" placeholder="用户名" required>
                    <input type="password" id="loginPassword" class="username-input" placeholder="密码" required>
                    <button type="submit" class="username-submit">登录</button>
                    <div id="loginMessage" class="login-message"></div>
                </form>
                
                <!-- 注册表单 -->
                <form id="registerForm" class="login-form">
                    <input type="text" id="registerUsername" class="username-input" placeholder="用户名 (2-20个字符)" required>
                    <input type="password" id="registerPassword" class="username-input" placeholder="密码 (至少6个字符)" required>
                    <input type="password" id="registerConfirmPassword" class="username-input" placeholder="确认密码" required>
                    <button type="submit" class="username-submit">注册</button>
                    <div id="registerMessage" class="login-message"></div>
                </form>
            </div>
        </div>

        <!-- 主内容区域 -->
        <main class="main-content">
            <div class="chat-container">
                <div class="chat-header">
                    <h2><i class="fas fa-users"></i> 在线聊天室 <span id="onlineCount" class="online-count">(0人在线)</span></h2>
                </div>
                
                <div class="chat-messages" id="chatMessages">
                    <!-- 消息将通过Socket.io动态生成 -->
                </div>
                
                <div class="chat-input-area">
                    <div class="input-container">
                        <input type="text" id="messageInput" placeholder="输入消息... (按Enter发送)" disabled>
                        <button id="sendMessage" disabled>
                            <i class="fas fa-paper-plane"></i>
                            发送
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 在线用户列表 -->
            <div class="user-list">
                <h3>
                    <i class="fas fa-user-friends"></i> 在线用户
                    <span id="userCount">0</span>
                </h3>
                <div class="users" id="userList">
                    <!-- 用户将通过Socket.io动态生成 -->
                </div>
            </div>
            
            <!-- 聊天室信息 -->
            <div class="chat-info">
                <p><i class="fas fa-info-circle"></i> 这是一个真正的实时聊天室，所有用户都是真实的</p>
                <p><i class="fas fa-keyboard"></i> 聊天命令: /私聊 [用户名] [消息] - 发起私聊 | /改名 [新用户名] - 修改用户名</p>
                <a href="index.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                    返回工具导航
                </a>
            </div>
        </main>

        <!-- 底部信息 -->
        <footer class="footer">
            <div class="footer-content">
                <p><a href="https://www.wuxiaoguo.com" target="_blank" class="footer-link">www.wuxiaoguo.com</a> | 实用工具导航 | 实时聊天室</p>
                <p class="footer-info">
                    <i class="fas fa-comments"></i>
                    与真实用户实时交流，系统管理员消息不显示IP地址
                </p>
            </div>
        </footer>
    </div>

    <!-- Socket.io 客户端库 -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <script>
        // 全局变量
        let socket = null;
        let currentUser = null;
        let onlineUsers = [];
        let activePrivateChats = new Map(); // chatId -> { targetUser, messages }
        let currentTheme = localStorage.getItem('theme') || 'light';
        
        // DOM 元素
        const loginModal = document.getElementById('loginModal');
        const loginTabs = document.querySelectorAll('.login-tab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginUsername = document.getElementById('loginUsername');
        const loginPassword = document.getElementById('loginPassword');
        const registerUsername = document.getElementById('registerUsername');
        const registerPassword = document.getElementById('registerPassword');
        const registerConfirmPassword = document.getElementById('registerConfirmPassword');
        const loginMessage = document.getElementById('loginMessage');
        const registerMessage = document.getElementById('registerMessage');
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendMessageBtn = document.getElementById('sendMessage');
        const themeToggleBtn = document.getElementById('themeToggle');
        const userList = document.getElementById('userList');
        const userCount = document.getElementById('userCount');
        const onlineCount = document.getElementById('onlineCount');
        
        // 初始化主题
        function initTheme() {
            document.documentElement.setAttribute('data-theme', currentTheme);
            updateThemeButton();
        }
        
        function updateThemeButton() {
            const icon = themeToggleBtn.querySelector('i');
            const text = themeToggleBtn.querySelector('span');
            
            if (currentTheme === 'dark') {
                icon.className = 'fas fa-sun';
                text.textContent = '浅色模式';
            } else {
                icon.className = 'fas fa-moon';
                text.textContent = '深色模式';
            }
        }
        
        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('theme', currentTheme);
            updateThemeButton();
        }
        
        // 初始化主题
        initTheme();
        themeToggleBtn.addEventListener('click', toggleTheme);
        
        // 登录/注册标签切换
        loginTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;
                
                // 更新标签状态
                loginTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                // 更新表单显示
                loginForm.classList.remove('active');
                registerForm.classList.remove('active');
                
                if (tabName === 'login') {
                    loginForm.classList.add('active');
                } else {
                    registerForm.classList.add('active');
                }
                
                // 清空消息
                loginMessage.textContent = '';
                registerMessage.textContent = '';
            });
        });
        
        // 登录表单提交
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = loginUsername.value.trim();
            const password = loginPassword.value.trim();
            
            if (!username || !password) {
                loginMessage.textContent = '用户名和密码不能为空';
                return;
            }
            
            if (socket && socket.connected) {
                socket.emit('login', { username: username, password: password });
            }
        });
        
        // 注册表单提交
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = registerUsername.value.trim();
            const password = registerPassword.value.trim();
            const confirmPassword = registerConfirmPassword.value.trim();
            
            if (!username || !password || !confirmPassword) {
                registerMessage.textContent = '所有字段都不能为空';
                return;
            }
            
            if (username.length < 2 || username.length > 20) {
                registerMessage.textContent = '用户名长度必须在2-20个字符之间';
                return;
            }
            
            if (password.length < 6) {
                registerMessage.textContent = '密码长度不能少于6个字符';
                return;
            }
            
            if (password !== confirmPassword) {
                registerMessage.textContent = '两次输入的密码不一致';
                return;
            }
            
            if (socket && socket.connected) {
                socket.emit('register', { username: username, password: password });
            }
        });
        
        // 连接Socket.io服务器
        function connectToServer() {
            // 使用相对路径连接
            socket = io();
            
            // 服务器要求登录
            socket.on('requireLogin', (data) => {
                loginModal.classList.remove('hidden');
                loginUsername.focus();
            });
            
            // 登录结果
            socket.on('loginResult', (data) => {
                if (data.success) {
                    // 登录成功
                    currentUser = { name: data.username };
                    loginModal.classList.add('hidden');
                    
                    // 启用消息输入
                    messageInput.disabled = false;
                    sendMessageBtn.disabled = false;
                    messageInput.placeholder = '输入消息... (按Enter发送)';
                    messageInput.focus();
                    
                    // 清空表单
                    loginUsername.value = '';
                    loginPassword.value = '';
                    loginMessage.textContent = '';
                    
                    console.log('登录成功:', data.username);
                } else {
                    loginMessage.textContent = data.message;
                }
            });
            
            // 注册结果
            socket.on('registerResult', (data) => {
                if (data.success) {
                    // 注册成功，切换到登录标签
                    loginTabs.forEach(t => t.classList.remove('active'));
                    loginTabs[0].classList.add('active');
                    loginForm.classList.add('active');
                    registerForm.classList.remove('active');
                    
                    // 填充用户名
                    loginUsername.value = data.username;
                    loginPassword.value = '';
                    loginPassword.focus();
                    
                    // 清空注册表单
                    registerUsername.value = '';
                    registerPassword.value = '';
                    registerConfirmPassword.value = '';
                    
                    registerMessage.textContent = '';
                    loginMessage.textContent = '注册成功，请输入密码登录';
                    
                    console.log('注册成功:', data.username);
                } else {
                    registerMessage.textContent = data.message;
                }
            });
            
            // 收到新消息
            socket.on('newMessage', addMessageToChat);
            
            // 收到私聊消息
            socket.on('newPrivateMessage', (data) => {
                addPrivateMessageToChat(data);
            });
            
            // 私聊会话建立
            socket.on('privateChatStarted', (data) => {
                openPrivateChatWindow(data.chatId, data.targetUser);
            });
            
            // 私聊会话关闭
            socket.on('privateChatClosed', (data) => {
                closePrivateChatWindow(data.chatId);
                addSystemMessage(data.message);
            });
            
            // 更新用户列表
            socket.on('userList', (data) => {
                onlineUsers = data.users;
                updateUserListDisplay();
                onlineCount.textContent = `(${data.onlineCount}人在线)`;
                userCount.textContent = data.onlineCount;
            });
            
            // 连接成功
            socket.on('connect', () => {
                console.log('已连接到聊天服务器');
            });
            
            // 连接断开
            socket.on('disconnect', () => {
                addSystemMessage('与服务器断开连接，正在尝试重连...');
                messageInput.disabled = true;
                sendMessageBtn.disabled = true;
            });
            
            // 重新连接
            socket.on('reconnect', () => {
                addSystemMessage('已重新连接到服务器');
                if (currentUser) {
                    messageInput.disabled = false;
                    sendMessageBtn.disabled = false;
                }
            });
            
            // 心跳检测
            socket.on('heartbeat', (data) => {
                // 心跳响应
            });
        }
        
        // 添加消息到聊天窗口
        function addMessageToChat(data) {
            const messageElement = document.createElement('div');
            
            // 确定消息类型
            let messageClass = 'message ';
            if (data.senderId === 'system') {
                messageClass += 'system';
            } else if (data.senderId === socket.id) {
                messageClass += 'sent';
            } else {
                messageClass += 'received';
            }
            
            if (data.isPrivate) {
                messageClass += ' private';
            }
            
            messageElement.className = messageClass;
            
            // 格式化时间
            const time = new Date(data.timestamp);
            const timeString = time.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit'
            });
            
            // 构建消息HTML
            let messageHTML = `
                <div class="message-header">
                    <span class="message-sender">${data.sender}</span>
                    <span class="message-time">${timeString}</span>
                </div>
                <div class="message-content">${formatMessage(data.message)}</div>
            `;
            
            // 如果不是系统消息且不是私聊消息，显示IP地址
            if (data.senderId !== 'system' && !data.isPrivate && data.ip) {
                messageHTML += `
                    <div class="message-ip">
                        <i class="fas fa-network-wired"></i> IP: ${data.ip}
                    </div>
                `;
            }
            
            messageElement.innerHTML = messageHTML;
            chatMessages.appendChild(messageElement);
            
            // 滚动到底部
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // 添加私聊消息
        function addPrivateMessageToChat(data) {
            // 检查是否有打开的私聊窗口
            if (activePrivateChats.has(data.chatId)) {
                const chatWindow = activePrivateChats.get(data.chatId).window;
                const messagesContainer = chatWindow.querySelector('.private-chat-messages');
                
                const messageElement = document.createElement('div');
                messageElement.className = `message ${data.senderId === socket.id ? 'sent' : 'received'}`;
                
                const time = new Date(data.timestamp);
                const timeString = time.toLocaleTimeString('zh-CN', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                messageElement.innerHTML = `
                    <div class="message-header">
                        <span class="message-sender">${data.sender}</span>
                        <span class="message-time">${timeString}</span>
                    </div>
                    <div class="message-content">${formatMessage(data.message)}</div>
                    <div class="message-ip">
                        <i class="fas fa-network-wired"></i> IP: ${data.ip}
                    </div>
                `;
                
                messagesContainer.appendChild(messageElement);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
            
            // 也在主聊天窗口显示私聊通知
            if (data.senderId !== socket.id) {
                addSystemMessage(`私聊消息来自 ${data.sender}`);
            }
        }
        
        // 添加系统消息
        function addSystemMessage(message) {
            const messageElement = document.createElement('div');
            messageElement.className = 'message system';
            
            const time = new Date();
            const timeString = time.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit'
            });
            
            messageElement.innerHTML = `
                <div class="message-header">
                    <span class="message-sender">系统通知</span>
                    <span class="message-time">${timeString}</span>
                </div>
                <div class="message-content">${formatMessage(message)}</div>
            `;
            
            chatMessages.appendChild(messageElement);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // 格式化消息（处理换行和链接）
        function formatMessage(message) {
            // 处理换行
            let formatted = message.replace(/\n/g, '<br>');
            
            // 简单链接检测
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            formatted = formatted.replace(urlRegex, '<a href="$1" target="_blank" style="color: var(--primary-color); text-decoration: underline;">$1</a>');
            
            return formatted;
        }
        
        // 更新用户列表显示
        function updateUserListDisplay() {
            userList.innerHTML = '';
            
            // 添加当前用户
            if (currentUser) {
                const youElement = document.createElement('div');
                youElement.className = 'user-tag you';
                youElement.innerHTML = `<i class="fas fa-user"></i> ${currentUser.name} (你)`;
                userList.appendChild(youElement);
            }
            
            // 添加其他在线用户
            onlineUsers.forEach(user => {
                if (user.id !== socket.id) {
                    const userElement = document.createElement('div');
                    userElement.className = 'user-tag';
                    userElement.innerHTML = `<i class="fas fa-user"></i> ${user.name}`;
                    userElement.title = `IP: ${user.ip}\n点击发起私聊`;
                    
                    // 点击用户发起私聊
                    userElement.addEventListener('click', () => {
                        startPrivateChat(user.id, user.name);
                    });
                    
                    userList.appendChild(userElement);
                }
            });
        }
        
        // 发起私聊
        function startPrivateChat(targetUserId, targetUserName) {
            if (socket && socket.connected) {
                socket.emit('startPrivateChat', targetUserId);
                addSystemMessage(`正在与 ${targetUserName} 建立私聊连接...`);
            }
        }
        
        // 打开私聊窗口
        function openPrivateChatWindow(chatId, targetUser) {
            // 如果窗口已存在，聚焦它
            if (activePrivateChats.has(chatId)) {
                const chatWindow = activePrivateChats.get(chatId).window;
                chatWindow.style.zIndex = '100';
                return;
            }
            
            // 创建私聊窗口
            const chatWindow = document.createElement('div');
            chatWindow.className = 'private-chat-window';
            chatWindow.innerHTML = `
                <div class="private-chat-header">
                    <span>私聊: ${targetUser.name}</span>
                    <button class="close-private-chat" data-chat-id="${chatId}">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="private-chat-messages"></div>
                <div class="private-chat-input">
                    <input type="text" class="private-message-input" placeholder="输入私聊消息..." data-chat-id="${chatId}" data-target-id="${targetUser.id}">
                </div>
            `;
            
            document.body.appendChild(chatWindow);
            
            // 存储私聊窗口引用
            activePrivateChats.set(chatId, {
                window: chatWindow,
                targetUser: targetUser
            });
            
            // 添加关闭按钮事件
            const closeBtn = chatWindow.querySelector('.close-private-chat');
            closeBtn.addEventListener('click', () => {
                closePrivateChatWindow(chatId);
                if (socket && socket.connected) {
                    socket.emit('closePrivateChat', chatId);
                }
            });
            
            // 添加消息输入事件
            const messageInput = chatWindow.querySelector('.private-message-input');
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && messageInput.value.trim()) {
                    sendPrivateMessage(chatId, targetUser.id, messageInput.value);
                    messageInput.value = '';
                }
            });
            
            // 定位私聊窗口（避免重叠）
            positionPrivateChatWindows();
        }
        
        // 关闭私聊窗口
        function closePrivateChatWindow(chatId) {
            if (activePrivateChats.has(chatId)) {
                const chatWindow = activePrivateChats.get(chatId).window;
                chatWindow.remove();
                activePrivateChats.delete(chatId);
                
                // 重新定位其他窗口
                positionPrivateChatWindows();
            }
        }
        
        // 定位私聊窗口（避免重叠）
        function positionPrivateChatWindows() {
            const windows = Array.from(activePrivateChats.values());
            const startRight = 20;
            const startBottom = 20;
            const windowWidth = 300;
            const windowHeight = 400;
            const gap = 20;
            
            windows.forEach((chat, index) => {
                const chatWindow = chat.window;
                const right = startRight + (windowWidth + gap) * index;
                const bottom = startBottom;
                
                chatWindow.style.right = `${right}px`;
                chatWindow.style.bottom = `${bottom}px`;
                chatWindow.style.zIndex = `${100 + index}`;
            });
        }
        
        // 发送私聊消息
        function sendPrivateMessage(chatId, targetUserId, message) {
            if (socket && socket.connected && message.trim()) {
                socket.emit('sendPrivateMessage', {
                    chatId: chatId,
                    targetUserId: targetUserId,
                    message: message.trim()
                });
            }
        }
        
        // 发送公共消息
        function sendPublicMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            if (socket && socket.connected) {
                socket.emit('sendMessage', { message: message });
                messageInput.value = '';
            }
        }
        
        // 事件监听
        sendMessageBtn.addEventListener('click', sendPublicMessage);
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendPublicMessage();
            }
        });
        
        // 页面加载完成后连接服务器
        document.addEventListener('DOMContentLoaded', () => {
            connectToServer();
            
            // 定期发送心跳
            setInterval(() => {
                if (socket && socket.connected) {
                    socket.emit('heartbeat');
                }
            }, 30000); // 每30秒发送一次心跳
        });
        
        // 页面卸载前断开连接
        window.addEventListener('beforeunload', () => {
            if (socket && socket.connected) {
                socket.disconnect();
            }
        });
    </script>
</body>
</html>
